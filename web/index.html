<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Akamai SIEM Analyzer</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header class="header">
		<div class="header-left">
			<h1 class="header-title">Akamai SIEM Analyzer</h1>
			<span id="health-status" class="health-badge">Loading...</span>
		</div>
		<div class="header-right">
			<span id="cost-indicator" class="cost-indicator" title="Today's AI cost"></span>
			<div id="user-avatar" class="user-avatar" title="User"></div>
		</div>
	</header>

	<main class="main">
		<section class="panel-left">
			<div class="panel-header">
				<h2>Analysis Stream</h2>
				<div class="filters">
					<select id="severity-filter" title="Filter by severity">
						<option value="">All Severities</option>
						<option value="critical">Critical</option>
						<option value="high">High</option>
						<option value="medium">Medium</option>
						<option value="low">Low</option>
						<option value="info">Info</option>
					</select>
				</div>
			</div>
			<div id="analysis-stream" class="analysis-stream"></div>
		</section>

		<section class="panel-right">
			<div id="detail-panel" class="detail-panel">
				<div class="detail-placeholder">
					<p>Select an analysis card to view details</p>
				</div>
			</div>
		</section>
	</main>

	<footer class="footer">
		<div class="footer-left">
			<button id="trigger-analysis" class="btn btn-primary" title="Trigger on-demand strategic analysis (admin only)">
				Trigger Analysis
			</button>
			<div class="time-range">
				<label for="time-range-select">Time Range:</label>
				<select id="time-range-select">
					<option value="1h">Last 1 Hour</option>
					<option value="6h">Last 6 Hours</option>
					<option value="24h" selected>Last 24 Hours</option>
					<option value="7d">Last 7 Days</option>
				</select>
			</div>
		</div>
		<div class="footer-right">
			<span id="stream-status" class="stream-status">Connecting...</span>
		</div>
	</footer>

	<!-- Lightbox overlay -->
	<div id="lightbox" class="lightbox hidden">
		<div class="lightbox-content">
			<button class="lightbox-close" title="Close">&times;</button>
			<div id="lightbox-body"></div>
		</div>
	</div>

	<script type="module" src="index.js"></script>
</body>
</html>
